  ai2thor_connection: AI2-THOR
  summary: AI2-THOR is the base interactive simulator for household embodied AI. It provides visually rich indoor scenes,
    navigation, physics-enabled object interaction, metadata, and a Python controller API, making it the foundation for many
    later navigation, manipulation, rearrangement, and instruction-following benchmarks.
