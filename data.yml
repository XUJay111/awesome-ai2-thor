    project: https://procthor.allenai.org/
    code: https://github.com/allenai/procthor
  ai2thor_connection: AI2-THOR
  summary: ProcTHOR brings large-scale procedural generation into the AI2-THOR ecosystem. It generates diverse, semantically
    plausible, interactive household environments and shows that environment scale and diversity can substantially improve
