    code: https://github.com/allenai/phone2proc
  ai2thor_connection: AI2-THOR-family
  summary: Phone2Proc conditions procedural scene generation on a quick phone scan of a target real-world environment. The
    generated training scenes preserve large-scale layout while randomizing clutter, materials, lighting, and object placement,
    improving sim-to-real robustness for ObjectNav.
  last_verified: '2026-06-23'
