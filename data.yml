    code: https://github.com/allenai/ai2thor
  ai2thor_connection: AI2-THOR
  summary: RoboTHOR extends AI2-THOR with paired simulated and real physical spaces, allowing researchers to quantify the
    transfer gap between simulation-trained navigation agents and real-world robot deployment. It helped turn sim-to-real
    generalization from an informal concern into a benchmarked research problem.
  last_verified: '2026-06-23'
