    code: https://github.com/allenai/ai2thor-rearrangement
  ai2thor_connection: AI2-THOR-family
  summary: 'Visual Room Rearrangement asks agents to observe a reference room state and then restore displaced objects and
    object states. The task moves beyond finding a target object: agents must remember, compare, navigate, interact, and repair
    a scene over a long sequence of actions.'
